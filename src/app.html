<!doctype html>
<html lang="en">
	<head>
		<title>GEM | Good enough metronome</title>
		<meta name="title" content="Good Enough Metronome - A Simple Online Metronome" />
		<meta
			name="description"
			content="GEM (Good Enough Metronome) is a free PWA designed for musicians who need a reliable and easy-to-use metronome. GEM does one thing, and it does it well enough."
		/>
		<meta
			name="keywords"
			content="GEM, Good Enough Metronome, PWA, online metronome, tempo, time signature, volume, music practice, musicians, beginners, professionals."
		/>
		<meta property="og:title" content="Good Enough Metronome - A Simple Online Metronome" />
		<meta
			property="og:description"
			content="GEM (Good Enough Metronome) is a free PWA designed for musicians who need a reliable and easy-to-use metronome. GEM does one thing, and it does it well enough."
		/>
		<meta property="og:image" content="%sveltekit.assets%/icons/icon_512.png" />

		<base href="/" />
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#fffcfa" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0A0908" />
		<script>
			(function () {
				var theme = localStorage.getItem('color-scheme');
				if (theme !== 'light' && theme !== 'dark') {
					theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
				}
				document.documentElement.setAttribute('color-scheme', theme);
			})();
		</script>
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
